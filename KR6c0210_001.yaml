body:
  text: 會刻仁王護國般若經疏序仁王護國般若經者乃八部般若之結經也夫般若之談時長理詣莫不蕩空釋滯絶想袪情良由衆生迷執久固真性難顯故佛且不揀善惡垢淨性相一切訶破雖真性及妙用不無而姑云無直待情忘理喪纖毫不容然後引出匿王之問端高張五忍之法網婆心徹底巧運錐鎚密接通別之初機淘鎔凡聖之玄路來至法華開顯領付家業點示般若之離相咸成諸法之實相究論實相之功功由般若般若之要要當妙悟故曰無量義者從一法生是也唯我天台智者大師深愍當來劫運漸衰鬪諍堅固般若緣疏經云若國欲亂鬼神先亂鬼神亂故即萬人亂是諸難起皆應受持講讀此般若波羅蜜多而護國法要尤在解說此經此大師經疏所由作焉惜乎此疏盛行海東中華失傳昔四明尊者搆仁王疏而弗獲亦猶天台大師拜楞嚴經而未得先後求法苦心有同揆歟幸有宋老僧如恂師得之海賈朝說之敘於簡端今龍藏雖載而講筵無聞適天台敏老法師應吳門諸縉紳請於戊戌冬住報恩北寺時值邊疆多故臣民不安乃於己亥春屬成蓮演講仁王護國般若經求佛保安惟成蓮所講係當世通行唐不空譯本而大師所疏為什公譯本經文互有異同大旨正堪補備且龍藏本經與疏各自為帙研究維艱爰遵天台大部之軌華嚴三合之例分經會疏合鐫方冊排科文於經前繫疏解於經後重加句讀庶幾條分縷析開卷瞭然成蓮復據北藏校勘一周合掌恭敬而說頌曰般若如虗空功德不可量付囑諸國王依教而信受菩薩金剛手承佛威神力一聞說是經頃刻為護持能令其國界無復諸災難疾疫與刀兵一切悉消除法施利羣生同發菩提心時在光緒二十六年荷月普門示現日台宗後學比丘成蓮敘於吳門報恩北寺之西齊
